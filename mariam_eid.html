<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>معايدة مريم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lateef:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --ink:   #1c1410;
    --cream: #faf6ee;
    --gold:  #c8900c;
    --teal:  #1a6e58;
  }

  html, body {
    min-height: 100%;
    font-family: 'Amiri', serif;
  }

  /* ══════════════════════════════════
     SCREEN 1 — full viewport, elegant
  ══════════════════════════════════ */
  #s1 {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f7f2ea;
    padding: 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  #s1.hidden { display: none; }

  /* subtle dot-grid background */
  #s1::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #c8900c22 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .s1-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* top label */
  .s1-eyebrow {
    font-family: 'Amiri', serif;
    font-style: italic;
    font-size: .9rem;
    color: #a08050;
    letter-spacing: .12em;
    margin-bottom: .5rem;
    text-align: center;
  }

  /* main title */
  .s1-title {
    font-family: 'Lateef', serif;
    font-size: 3.4rem;
    color: var(--ink);
    text-align: center;
    line-height: 1;
    margin-bottom: .2rem;
  }

  /* thin gold rule */
  .s1-rule {
    width: 120px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: .6rem auto 1.4rem;
  }

  /* chandelier SVG strip — small, centred */
  .s1-chandelier {
    width: 200px;
    margin-bottom: 1.6rem;
    opacity: .9;
  }
  .s1-chandelier svg { display: block; width: 100%; }

  /* the white input card */
  .s1-card {
    width: 100%;
    background: #fff;
    border-radius: 20px;
    padding: 2rem 2rem 2.2rem;
    box-shadow:
      0 2px 0 #e8dcc8,
      0 8px 40px rgba(60,40,10,.1);
    border: 1px solid #e8dcc8;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .s1-card-title {
    font-family: 'Lateef', serif;
    font-size: 1.7rem;
    color: var(--teal);
    text-align: center;
    margin-bottom: .2rem;
  }
  .s1-card-sub {
    font-size: .82rem;
    color: #9a8868;
    font-style: italic;
    text-align: center;
    margin-bottom: 1.2rem;
  }

  .s1-input {
    width: 100%;
    padding: .82rem 1.1rem;
    border: 1.5px solid #d8cdb8;
    border-radius: 12px;
    background: #faf8f4;
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    color: var(--ink);
    text-align: center;
    outline: none;
    direction: rtl;
    transition: border-color .2s, box-shadow .2s;
  }
  .s1-input::placeholder { color: #c8b898; font-style: italic; }
  .s1-input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(26,110,88,.12);
  }

  .s1-btn {
    margin-top: .9rem;
    width: 100%;
    padding: .88rem;
    background: var(--ink);
    border: none;
    border-radius: 12px;
    font-family: 'Lateef', serif;
    font-size: 1.55rem;
    color: #f7f2ea;
    cursor: pointer;
    letter-spacing: .05em;
    transition: opacity .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .s1-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,144,12,.15) 0%, transparent 60%);
  }
  .s1-btn:hover { opacity: .9; transform: translateY(-1px); }
  .s1-btn:active { transform: translateY(0); }

  /* bottom tagline */
  .s1-tagline {
    margin-top: 1.4rem;
    font-size: .78rem;
    color: #b8a888;
    text-align: center;
    font-style: italic;
    letter-spacing: .06em;
  }

  /* ══════════════════════════════════
     SCREEN 2 — card display
  ══════════════════════════════════ */
  #s2 {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background: #f0ebe0;
    padding: 1.2rem 1rem 2.5rem;
    position: relative;
  }
  #s2::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #c8900c18 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }
  #s2.active { display: flex; }

  .s2-topbar {
    width: 100%;
    max-width: 400px;
    display: flex;
    justify-content: flex-end;
    margin-bottom: .8rem;
    position: relative;
    z-index: 1;
  }
  .btn-back {
    background: #fff;
    border: 1.5px solid #d8cdb8;
    border-radius: 9px;
    color: var(--ink);
    font-family: 'Amiri', serif;
    font-size: .95rem;
    padding: .38rem 1rem;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.07);
    transition: background .15s;
  }
  .btn-back:hover { background: var(--cream); }

  .card-outer {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 16px 48px rgba(30,15,5,.22));
  }
  .card-outer svg { display: block; width: 100%; }

  .btn-save {
    margin-top: 1rem;
    width: 100%;
    max-width: 400px;
    padding: .88rem;
    background: var(--ink);
    border: none;
    border-radius: 12px;
    font-family: 'Lateef', serif;
    font-size: 1.55rem;
    color: #f7f2ea;
    cursor: pointer;
    letter-spacing: .05em;
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    box-shadow: 0 4px 18px rgba(30,15,5,.18);
    transition: opacity .2s, transform .15s;
    position: relative; z-index: 1;
  }
  .btn-save:hover { opacity: .9; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  #s2.active { animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both; }

  .toast {
    position: fixed; bottom: 1.8rem; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--ink); color: #f7f2ea;
    padding: .6rem 1.8rem; border-radius: 100px;
    font-family: 'Amiri', serif; font-size: .95rem;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
    z-index: 999;
    transition: transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
    opacity: 0;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/canvg/3.0.10/umd.min.js"></script>
<script>
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') showCard();
  });

  function showCard() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      const i = document.getElementById('nameInput');
      i.style.borderColor = '#c84040';
      i.focus();
      setTimeout(() => i.style.borderColor = '#d8cdb8', 1400);
      return;
    }
    document.getElementById('svgName').textContent = name;
    document.getElementById('s1').classList.add('hidden');
    document.getElementById('s2').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goBack() {
    document.getElementById('s2').classList.remove('active');
    document.getElementById('s1').classList.remove('hidden');
  }

  async function saveCard() {
    const btn = document.getElementById('btnSave');
    btn.textContent = '⏳ جاري الحفظ...';
    btn.disabled = true;

    const svg   = document.getElementById('cardSvg');
    const scale = 3;
    const W = 392 * scale;
    const H = 648 * scale;

    try {
      // Inline the Google Fonts so canvg renders Arabic correctly
      const fontResp = await Promise.allSettled([
        fetch('https://fonts.gstatic.com/s/lateef/v28/hESw6XVnNCxEvkb0nk6n.woff2'),
        fetch('https://fonts.gstatic.com/s/amiri/v27/J7aRnpd8CGxBHqUp.woff2'),
      ]);

      let styleBlock = '';
      for (const r of fontResp) {
        if (r.status === 'fulfilled' && r.value.ok) {
          const ab  = await r.value.arrayBuffer();
          const b64 = btoa(String.fromCharCode(...new Uint8Array(ab)));
          const url = r.value.url;
          const fmt = url.includes('lateef') ? 'Lateef' : 'Amiri';
          styleBlock += `@font-face{font-family:'${fmt}';src:url('data:font/woff2;base64,${b64}') format('woff2');}`;
        }
      }

      // Clone SVG, embed font style
      const clone = svg.cloneNode(true);
      if (styleBlock) {
        const st = document.createElementNS('http://www.w3.org/2000/svg','style');
        st.textContent = styleBlock;
        clone.insertBefore(st, clone.firstChild);
      }

      const svgStr = new XMLSerializer().serializeToString(clone);
      const canvas = document.createElement('canvas');
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      const v = await canvg.Canvg.fromString(ctx, svgStr, {
        scaleWidth: W, scaleHeight: H,
        ignoreDimensions: true, ignoreClear: false,
      });
      await v.render();

      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'eid-mubarak.png';
        a.click();
        URL.revokeObjectURL(a.href);
        btn.textContent = '📸 حفظ الصورة';
        btn.disabled = false;
        showToast();
      }, 'image/png');

    } catch(err) {
      console.warn('canvg error, fallback', err);
      // Fallback: render SVG via Image + canvas (fonts may vary by OS)
      const svgStr = new XMLSerializer().serializeToString(svg);
      const blob   = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
      const url    = URL.createObjectURL(blob);
      const img    = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width  = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);
        URL.revokeObjectURL(url);
        canvas.toBlob(b => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(b);
          a.download = 'eid-mubarak.png';
          a.click();
          URL.revokeObjectURL(a.href);
          btn.textContent = '📸 حفظ الصورة';
          btn.disabled = false;
          showToast();
        }, 'image/png');
      };
      img.src = url;
    }
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
